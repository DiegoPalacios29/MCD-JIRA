version: '3.8'  
services:  
  middleware:  
    image: node:latest  
    container_name: middleware_service  
    ports:  
      - '3000:3000'  
    volumes:  
      - .:/app  
    working_dir: /app  
    command: npm start  
    environment:  
      - NODE_ENV=production  
      - PORT=3000  

networks:  
  default:  
    external:  
      name: my_network  
